<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spatch - ログイン</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg border border-gray-200">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600 tracking-wider mb-2">🚀 spatch</h1>
            <p class="text-sm text-gray-500">隙間を価値に変えるプラットフォーム</p>
        </div>

        <div class="flex border-b border-gray-200 mb-6 text-sm font-medium text-center">
            <button onclick="switchTab('login')" id="tab-login" class="flex-1 pb-3 border-b-2 border-blue-600 text-blue-600 font-bold">ログイン</button>
            <button onclick="switchTab('signup')" id="tab-signup" class="flex-1 pb-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700">新規アカウント登録</button>
        </div>

        <form id="form-login" onsubmit="handleLogin(event)" class="flex flex-col gap-4">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">メールアドレス</label>
                <input id="login-email" type="email" required class="w-full px-4 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">パスワード</label>
                <input id="login-password" type="password" required class="w-full px-4 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-bold hover:bg-blue-700">ログインする</button>
        </form>

        <form id="form-signup" onsubmit="handleSignup(event)" class="hidden flex flex-col gap-4">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">メールアドレス</label>
                <input id="signup-email" type="email" required class="w-full px-4 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">パスワード</label>
                <input id="signup-password" type="password" required class="w-full px-4 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">あなたの役割</label>
                <select id="signup-role" class="w-full px-4 py-2 border rounded-lg text-sm bg-gray-50 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="player">副業プレイヤー（自販機を置きたい）</option>
                    <option value="landlord">地主（土地を貸したい）</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-green-600 text-white py-2.5 rounded-lg font-bold hover:bg-green-700">アカウントを作成する</button>
        </form>
    </div>

    <script>
        function switchTab(type) {
            const loginForm = document.getElementById('form-login');
            const signupForm = document.getElementById('form-signup');
            const tabLogin = document.getElementById('tab-login');
            const tabSignup = document.getElementById('tab-signup');

            if (type === 'login') {
                loginForm.classList.remove('hidden'); signupForm.classList.add('hidden');
                tabLogin.className = "flex-1 pb-3 border-b-2 border-blue-600 text-blue-600 font-bold";
                tabSignup.className = "flex-1 pb-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700";
            } else {
                loginForm.classList.add('hidden'); signupForm.classList.remove('hidden');
                tabLogin.className = "flex-1 pb-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700";
                tabSignup.className = "flex-1 pb-3 border-b-2 border-green-600 text-green-600 font-bold";
            }
        }

        async function handleSignup(event) {
            event.preventDefault();
            try {
                const formData = new FormData();
                formData.append('email', document.getElementById('signup-email').value);
                formData.append('password', document.getElementById('signup-password').value);
                formData.append('role', document.getElementById('signup-role').value);

                const response = await fetch('https://spatch-w30r.onrender.com/api/signup', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (response.ok) {
                    alert('登録が成功しました！ログインしてください。');
                    switchTab('login');
                } else { alert(result.detail); }
            } catch (e) { alert('エラーが発生しました。'); }
        }

        async function handleLogin(event) {
            event.preventDefault();
            try {
                const formData = new FormData();
                formData.append('email', document.getElementById('login-email').value);
                formData.append('password', document.getElementById('login-password').value);

                const response = await fetch('https://spatch-w30r.onrender.com/api/login', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (response.ok) {
                    localStorage.setItem('spatch_user', JSON.stringify(result));
                    window.location.href = 'index.html';
                } else { alert(result.detail); }
            } catch (e) { alert('ログインに失敗しました。'); }
        }

        if (localStorage.getItem('spatch_user')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
